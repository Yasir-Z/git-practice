# pipeline starts here
name: ci-pipeline

on:
  push:
    branches:
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: build forntend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:v1 ./frontend

      - name: build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:v1 ./backend

      - name: push images to dockerhub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:v1 ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:v1 ./backend


