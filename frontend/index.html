<!DOCTYPE html>
<html>
<head>
  <title>DevOps CI/CD Demo</title>
</head>
<body>
  <h1>🚀 CI/CD Demo App</h1>
  <button onclick="loadData()">Get Backend Data</button>

  <p id="output"></p>

  <script>
    async function loadData() {
      const res = await fetch('http://backend-service:3000/api');
      const data = await res.json();
      document.getElementById('output').innerText = data.message;
    }
  </script>
</body>
</html>
